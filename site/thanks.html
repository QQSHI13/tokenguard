<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Thanks — Token Guard</title>
  <meta name="description" content="Thank you for purchasing Token Guard.">
  <link rel="icon" type="image/png" href="/favicon.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <link rel="stylesheet" href="/styles.css?v=2">
  <meta name="color-scheme" content="light dark">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (regs) {
        regs.forEach(function (r) { r.unregister(); });
      });
    }
    if (localStorage.theme === 'dark' || (!('theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.classList.add('dark');
    }
  </script>
</head>
<body class="bg-white text-slate-900 dark:bg-slate-950 dark:text-slate-100">
  <header class="border-b border-slate-100 dark:border-slate-800">
    <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
      <a href="/" class="flex items-center gap-2 text-lg font-bold">
        <span>🛡️</span>
        <span>Token Guard</span>
      </a>
      <div class="flex items-center gap-3">
        <button id="theme-toggle" aria-label="Toggle dark mode" class="rounded-lg p-2 text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-slate-800">
          🌙
        </button>
        <a href="/" class="text-sm font-medium text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100">← Back</a>
      </div>
    </div>
  </header>

  <main class="px-6 py-20">
    <div class="mx-auto max-w-2xl text-center">
      <h1 class="text-4xl font-extrabold tracking-tight sm:text-5xl">
        Thanks for purchasing Token Guard.
      </h1>
      <p class="mx-auto mt-6 max-w-lg text-lg text-slate-600 dark:text-slate-400">
        Your license key will be emailed to you.
      </p>
      <div class="mt-10">
        <a href="/" class="rounded-lg bg-emerald-600 px-6 py-3 text-base font-semibold text-white hover:bg-emerald-700">
          Back to home
        </a>
      </div>
    </div>
  </main>

  <footer class="border-t border-slate-100 px-6 py-10 dark:border-slate-800">
    <div class="mx-auto flex max-w-6xl flex-col items-center justify-between gap-4 text-sm text-slate-500 dark:text-slate-400 md:flex-row">
      <p>© 2026 Token Guard. Open source under Apache-2.0.</p>
      <div class="flex gap-6">
        <a href="/privacy.html" class="hover:text-slate-900 dark:hover:text-slate-100">Privacy</a>
        <a href="/terms.html" class="hover:text-slate-900 dark:hover:text-slate-100">Terms</a>
        <a href="/refund.html" class="hover:text-slate-900 dark:hover:text-slate-100">Refund</a>
      </div>
    </div>
  </footer>

  <script>
    const btn = document.getElementById('theme-toggle');
    function updateIcon() {
      btn.textContent = document.documentElement.classList.contains('dark') ? '☀️' : '🌙';
    }
    btn.addEventListener('click', () => {
      const html = document.documentElement;
      if (html.classList.contains('dark')) {
        html.classList.remove('dark');
        localStorage.theme = 'light';
      } else {
        html.classList.add('dark');
        localStorage.theme = 'dark';
      }
      updateIcon();
    });
    updateIcon();
  </script>
</body>
</html>
