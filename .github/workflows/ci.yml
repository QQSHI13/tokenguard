name: CI

on:
  push:
    branches-ignore: [pages]
  pull_request:
  issue_comment:
    types: [created]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Small debug job that always runs on PR comments so we can verify the trigger.
  rerun-check:
    name: Rerun check
    if: github.event_name == 'issue_comment' && github.event.issue.pull_request
    runs-on: ubuntu-latest
    steps:
      - name: Debug comment event
        run: |
          echo "Comment body: ${{ github.event.comment.body }}"
          echo "Author association: ${{ github.event.comment.author_association }}"
          echo "PR number: ${{ github.event.issue.number }}"

  frontend:
    name: Frontend type-check
    if: >-
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@ci rerun') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: >-
            ${{
              github.event_name == 'issue_comment'
                && format('refs/pull/{0}/merge', github.event.issue.number)
                || ''
            }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm run build

      - name: Build site
        run: cd site && npm ci && npm run build

  rust-check:
    name: Rust checks
    needs: frontend
    if: >-
      github.event_name != 'issue_comment' ||
      (
        github.event.issue.pull_request &&
        contains(github.event.comment.body, '@ci rerun') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0
        with:
          ref: >-
            ${{
              github.event_name == 'issue_comment'
                && format('refs/pull/{0}/merge', github.event.issue.number)
                || ''
            }}

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri
          key: ubuntu-latest

      - run: npm ci

      # generate_context!() needs a frontendDist while we run cargo check/test.
      - name: Create frontend dist placeholder
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><title>Token Guard</title></head><body></body></html>' > dist/index.html

      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
