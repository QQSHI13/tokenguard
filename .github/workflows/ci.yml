name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  frontend:
    name: Frontend type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci
      - run: npx tsc -b --noEmit
      - run: npm run build

  rust:
    name: Rust build + test + clippy
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}

      # Tauri's generate_context!() checks that frontendDist exists at compile time,
      # but the Rust job doesn't build the frontend. A minimal placeholder is enough
      # for cargo check/test/clippy.
      - name: Create frontend dist placeholder
        run: |
          mkdir -p dist
          echo '<!DOCTYPE html><html><head><title>Token Guard</title></head><body></body></html>' > dist/index.html

      - name: Check formatting
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - run: cargo test --manifest-path src-tauri/Cargo.toml
      - run: cargo build --manifest-path src-tauri/Cargo.toml

  tauri-build:
    name: Build Tauri bundles
    needs: [frontend, rust]
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2.9.1
        with:
          workspaces: src-tauri
          key: ${{ matrix.os }}-bundle

      - name: Install Tauri CLI
        run: cargo install tauri-cli --locked

      - run: npm ci

      - name: Build Tauri bundles
        run: cargo tauri build --verbose
        env:
          CI: true

      - name: Upload bundles
        uses: actions/upload-artifact@v4
        with:
          name: tokenguard-${{ matrix.os }}
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
            src-tauri/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
